name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGION: asia-northeast3
  REGISTRY: asia-northeast3-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/ai-chat
  BACKEND_URL: https://ai-chat-backend-370670066576.asia-northeast3.run.app

# Required GitHub Variables (Settings → Secrets and variables → Actions → Variables):
#   GCP_PROJECT_ID  : GCP project ID
#   GCP_WIF_PROVIDER: projects/<number>/locations/global/workloadIdentityPools/github-pool/providers/github-provider
#   GCP_SA_EMAIL    : github-actions@<project-id>.iam.gserviceaccount.com

permissions:
  contents: read
  id-token: write

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          version: latest

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build & push backend image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --push \
            -t ${{ env.REGISTRY }}/backend:latest \
            backend

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ai-chat-backend \
            --image ${{ env.REGISTRY }}/backend:latest \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 1Gi \
            --cpu 1 \
            --max-instances 2 \
            --concurrency 10 \
            --vpc-connector ai-chat-connector \
            --vpc-egress all-traffic \
            --set-secrets ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,MONGODB_URI=MONGODB_URI:latest

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Next.js
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ env.BACKEND_URL }}
        run: npm run build

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          version: latest

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build & push frontend image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --push \
            -f frontend/Dockerfile.prebuilt \
            -t ${{ env.REGISTRY }}/frontend:latest \
            frontend

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ai-chat-frontend \
            --image ${{ env.REGISTRY }}/frontend:latest \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --max-instances 2 \
            --port 3000
