name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGION: asia-northeast3
  REGISTRY: asia-northeast3-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/ai-chat
  BACKEND_URL: https://ai-chat-backend-370670066576.asia-northeast3.run.app

# Required GitHub configuration:
#   Secrets  → GCP_SA_KEY  : GCP service account JSON key
#   Variables → GCP_PROJECT_ID : GCP project ID (e.g. project-0edc7252-3902-43fa-a66)
#
# Required IAM roles for the service account:
#   roles/run.admin
#   roles/artifactregistry.writer
#   roles/iam.serviceAccountUser

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build & push backend image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --push \
            -t ${{ env.REGISTRY }}/backend:latest \
            backend

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ai-chat-backend \
            --image ${{ env.REGISTRY }}/backend:latest \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 1Gi \
            --cpu 1 \
            --max-instances 2 \
            --concurrency 10 \
            --vpc-connector ai-chat-connector \
            --vpc-egress all-traffic \
            --set-secrets ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,MONGODB_URI=MONGODB_URI:latest

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Next.js
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ env.BACKEND_URL }}
        run: npm run build

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build & push frontend image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --push \
            -f frontend/Dockerfile.prebuilt \
            -t ${{ env.REGISTRY }}/frontend:latest \
            frontend

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ai-chat-frontend \
            --image ${{ env.REGISTRY }}/frontend:latest \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --max-instances 2 \
            --port 3000
