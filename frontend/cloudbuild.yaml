steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '--build-arg'
      - 'NEXT_PUBLIC_API_URL=${_NEXT_PUBLIC_API_URL}'
      - '-t'
      - '${_IMAGE}'
      - '.'

substitutions:
  _NEXT_PUBLIC_API_URL: 'http://localhost:8000'
  _IMAGE: 'asia-northeast3-docker.pkg.dev/project-0edc7252-3902-43fa-a66/ai-chat/frontend:latest'

images:
  - '${_IMAGE}'

options:
  machineType: 'E2_HIGHCPU_8'
